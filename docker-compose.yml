version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: habit-rhythm-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: habit-rhythm-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GITHUB_ID: ${GITHUB_ID:-}
      GITHUB_SECRET: ${GITHUB_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MOCK_AUTH_ENABLED: ${MOCK_AUTH_ENABLED:-false}
      TEST_USER_NAME: ${TEST_USER_NAME:-Test User}
      TEST_USER_EMAIL: ${TEST_USER_EMAIL:-}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-}
      TEST_USER_PERMISSIONS: ${TEST_USER_PERMISSIONS:-habit:read,habit:write,habit:delete}
      NEXT_PUBLIC_ENABLE_TEST_LOGIN: ${NEXT_PUBLIC_ENABLE_TEST_LOGIN:-false}
      NEXT_PUBLIC_TEST_USER_EMAIL: ${NEXT_PUBLIC_TEST_USER_EMAIL:-}
    depends_on:
      - postgres

volumes:
  postgres-data:
